name: portfolio-v2

x-app: &app
  build:
    context: .
    dockerfile: docker/php/Dockerfile
    target: development
  env_file:
    - path: .env
      required: false
  environment:
    APP_ENV: local
    APP_KEY: ${APP_KEY:-base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
    APP_DEBUG: "true"
    APP_URL: http://localhost:8080
    LOG_CHANNEL: stderr
    LOG_LEVEL: debug
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_DATABASE: ${DB_DATABASE:-portfolio}
    DB_USERNAME: ${DB_USERNAME:-portfolio}
    DB_PASSWORD: ${DB_PASSWORD:-change-me-locally}
    CACHE_STORE: redis
    SESSION_DRIVER: redis
    QUEUE_CONNECTION: redis
    REDIS_HOST: redis
    REDIS_PORT: "6379"
    MAIL_MAILER: smtp
    MAIL_HOST: mailpit
    MAIL_PORT: "1025"
  volumes:
    - .:/var/www/html
    - vendor:/var/www/html/vendor
    - node_modules:/var/www/html/node_modules
  init: true

services:
  app:
    <<: *app
    command: php-fpm
    healthcheck:
      test: ["CMD-SHELL", "php artisan about --only=environment >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-portfolio}
      POSTGRES_USER: ${DB_USERNAME:-portfolio}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-locally}
    ports:
      - "${DB_FORWARD_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_FORWARD_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  queue:
    <<: *app
    command: php artisan queue:work redis --sleep=1 --tries=3 --timeout=90 --no-interaction
    restart: unless-stopped
    stop_grace_period: 95s
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    <<: *app
    command: php artisan schedule:work --no-interaction
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "${MAILPIT_SMTP_FORWARD_PORT:-1025}:1025"
      - "${MAILPIT_UI_FORWARD_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  postgres_data:
  redis_data:
  vendor:
  node_modules:
